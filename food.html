<!DOCTYPE html>
<html>
    <head>
        <title>Food Delivery</title>
        <style>
            body{
                font-family:arial,sans-serif;
                background:#f5f5f5;
            }
            .header{
                background:white;
                padding:15px;
            }
            .search-box{
                background:white;
                margin: 10px 15 px;
                padding: 10px;
                border-radius:10px;
            }
            .search-box input{
                width:100%;
                font-size:15px;
            }
            .title{
                margin: 15px;
                font-weight:bold;
            }
            .container{
                display:flex;
                flex-wrap:wrap;
                justify-content:center;
                padding:10px;
            }
            .card{
                width:40%;
                margin:10px;
                background: white;
                border-radius:15px;
                vertical-align:top;
                box-sizing: border-box;
                overflow:hidden;
                padding:20px;
            }
            .card img{
                width:100%;
                height:cover;
                object-fit:cover;
            }
            .card-content{
                padding: 10px;
            }
            .name{
            font-weight:bold;
            font-size: 15px;
            }
            .details{
                font-size:13px;
                color:gray;
                margin-top:4px;
            }
            .rating{
                color:green;
                font-size:14px;
                margin-top:5px;
            }
            @media(max-width:600px){
                .card{
                    width:90%;
                }
            }
        </style>
    </head>
    <body>
        <div class="header">
            <h2>Food Delivery</h2>
            <p> Order from nearby restaurants</p>
        </div>
        <div class="search-box">
            <input type="text" placeholder="search for restaurents or dishes">
        </div>
        <div class="title">restaurants near you</div>
        <div class="container">
            <div class="card">
                <img src="images/mehfil.webp">
                <div class="card-content">
                    <div class="name">Mehfil</div>
                    <div class="details">Biriyani . North Indian</div>
                    <div class="rating">4.2 . 30 mins</div>
                </div>
            </div>
            <div class="card">
                <img src="images/paradise.webp">
                <div class="card-content">
                    <div class="name">Paradise</div>
                    <div class="details">Biriyani . Hyderabadi</div>
                    <div class="rating">4.1 . 35 mins</div>
                </div>
            </div>
            <div class="card">
                <img src="images/burgerking.webp">
                <div class="card-content">
                    <div class="name">Burger King</div>
                    <div class="details">Burger . Fast Food</div>
                    <div class="rating">4.0 . 25 mins</div>
                </div>
            </div>
            <div class="card">
                <img src="images/kfc.webp">
                <div class="card-content">
                    <div class="name">KFC</div>
                    <div class="details">Chicken . Fast Food</div>
                    <div class="rating">3,9 . 28 mins</div>
                </div>
            </div>
        </div>
    </body>
</html>
