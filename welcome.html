<html>
    <head>
        <title>Welcome|Swiggy Clone</title>
        <style>
            body{
                margin:0;
                font-family: Arial,sans-serif;
                background:linear-gradient(120deg,#ff5200,#ff914d);
                height:100vh;
            }
            .welcome-container{
                display:flex;
                height:100vh;
                align-items:center;
                justify-content:space-around;
                color:white;
            }
            .welcome-text h1{
                font-size: 48px;
            }
            .welcome-text p{
                font-size: 20px;
            }
            .login-box{
                background: white;
                padding: 30px;
                border-radius: 10px;
                width: 300px;
                color: black;
            }
            .login-box h2{
                text-align: center;
                color:#ff5200
            }
            .login-box input{
                width: 100%;
                padding:10px;
                background:#ff5200;
                border:none;
                color:white;
                font-size:16px;
                border-radius:5px;
                cursor:pointer;
            }
        </style>
    </head>
    <body>
        <div class="welcome-container">
        <div class="welcome-text">
            <h1>Welcome to Foodie's Hub</h1>
            <p>Order food from your favorite restaurents</p>
        </div>
        <div class="login-box">
            <h2>Sign In</h2>
            <form onsubmit="return loginuser()">
                <input type="text" id="username" placeholder="username" required>
                <input type="password" id="password" placeholder="password" required>
                <button type="submit">Login</button>
            </form>
        </div>
        </div>
        <script>
            function loginuser(event){
                event.preventDefault();
                let user=document.getElementById("username").value;
                let pass=document.getElementById("password").value;
                if(user === "" || pass === ""){
                    alert("please fill all fields");
                }
                else{
                    window.location.href = "index-1.html";
                }
        }
        </script>
    </body>
</html>
