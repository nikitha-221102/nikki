<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>user-profile</title>
    <style>
        body {
            height: 100vh;
            background-image: url("images/food-bgimg.jpeg");
            background-size: cover;
            background-position: center;
        }

        .container {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            height: 100vh;
            padding-right: 100px;
        }

        .form {
            background: rgba(255, 255, 255, 0.9);
            width: 400px;
            padding: 40px;
        }

        .form h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #0f766e;
        }

        .form input,
        .form textarea,
        .form select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
        }
        .radio{
            gap:20px;
        }
        .radio input{
            width: 16px;
            height: 16px;
            margin-right: 6px;
        }
        .radio input:checked{
            background-color: #0f766e;
        }
        .radio label{
            display: flex;
            align-items: center;
            font-size: 15px;
        }

        .form button {
            width: 100%;
            padding: 15px;
            background: #0f766e;
            color: white;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
        }

        .form button:hover {
            background: #065f5b;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="form">
            <h2>User Info:</h2>
            <form>
                <label for="name">User name:</label>
                <input type="text" id="name" name="name" placeholder="enter your name">
                <br>
                <label for="phno">PhoneNummber:</label>
                <input type="tel" id="phno" name="phno" placeholder="enter phno">
                <br>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email">
                <br>
                <label for="address">Address:</label>
                <textarea placeholder="enter Delivery address"></textarea>
                <br>
                <select>
                    <option>Select Favorite Food</option>
                    <option>Biriyani</option>
                    <option>pizza</option>
                    <option>Noodles</option>
                    <option>French Fries</option>
                </select>
                <div class="radio">
                    <label>Food-Type:</label>
                    <label for="veg"><input type="radio" id="veg" name="food">Veg</label>
                    <label for="non-veg"><input type="radio" id="non-veg" name="food">Non-Veg</label>
                </div>
                <button type="submit">Save Details</button>
            </form>
        </div>
    </div>
</body>

</html>
